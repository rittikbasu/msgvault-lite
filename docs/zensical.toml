[project]
site_name = "msgvault"
site_url = "https://msgvault.io"
site_description = "Offline email and message archive with full-text search, interactive TUI, and multi-account support. Import from Gmail, IMAP, PST, MBOX, Apple Mail, WhatsApp, iMessage, Google Voice, Facebook Messenger, and SMS Backup & Restore."
site_author = "Kenn Software LLC"
copyright = 'Copyright &copy; 2026 <a href="https://kenn.io">Kenn Software LLC</a>. MIT License.'
docs_dir = "docs"
site_dir = "site"
repo_url = "https://github.com/kenn-io/msgvault"
repo_name = "kenn-io/msgvault"
extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/lightbox.js"]
use_directory_urls = true
nav = [
  {"Introduction" = "introduction.md"},
  {"Setup Guide" = "setup.md"},
  {"Interactive TUI" = "usage/tui.md"},
  {"Configuration" = "configuration.md"},
  {"CLI Reference" = "cli-reference.md"},
  {"MCP Server" = "usage/chat.md"},
  {"Web Server" = "api-server.md"},
  {"CLI Usage" = [
    {"Searching" = "usage/searching.md"},
    {"Vector Search" = "usage/vector-search.md"},
    {"Importing Local Email" = "usage/importing.md"},
    {"Text Messages" = "usage/text-messages.md"},
    {"Google Calendar" = "usage/calendar.md"},
    {"Exporting Data" = "usage/exporting.md"},
    {"Analytics & Stats" = "usage/analytics.md"},
    {"SQL Queries" = "usage/querying.md"},
    {"Deleting Email" = "usage/deletion.md"},
    {"Accounts & Collections" = "usage/multi-account.md"},
    {"Deduplication" = "usage/deduplication.md"},
    {"Backup" = "usage/backup.md"},
  ]},
  {"Guides" = [
    {"OAuth Setup" = "guides/oauth-setup.md"},
    {"Remote Deployment" = "guides/remote-deployment.md"},
    {"Daemon Migration" = "guides/daemon-migration.md"},
    {"Verify Integrity" = "guides/verification.md"},
  ]},
  {"Architecture" = [
    {"Overview" = "architecture/overview.md"},
    {"Data Storage" = "architecture/storage.md"},
    {"PostgreSQL Backend" = "architecture/postgresql.md"},
    {"Search Ranking" = "architecture/search-ranking.md"},
    {"Backup Repository Format" = "architecture/backup-format.md"},
  ]},
  {"Troubleshooting" = "troubleshooting.md"},
  {"Development" = "development.md"},
  {"FAQ" = "faq.md"},
  {"Changelog" = "changelog.md"},
]

[project.extra]
homepage = "/"

[project.theme]
variant = "modern"
custom_dir = "overrides"
logo = "assets/static/favicon.svg"
favicon = "assets/static/favicon.svg"
features = [
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.sections",
  "navigation.path",
  "content.code.copy",
]

[project.theme.palette]
scheme = "slate"
primary = "custom"
accent = "custom"

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "lucide/pencil"
view = "lucide/file-code"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
