info:
  title: msgvault API
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/ping:
    get:
      operationId: daemonPing
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingInfo"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Daemon discovery ping
      tags:
        - Daemon
  /api/v1/accounts:
    get:
      operationId: listAccounts
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: List scheduler-configured accounts (with sync schedules); use /cli/accounts for all archived sources
      tags:
        - API
    post:
      operationId: addAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAccountRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessageResponse"
          description: OK
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessageResponse"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Add an account
      tags:
        - API
  /api/v1/aggregates:
    get:
      operationId: getAggregates
      parameters:
        - description: Aggregate view type
          in: query
          name: view_type
          schema:
            type: string
        - description: "Sort field: count, size, attachment_size, or name"
          in: query
          name: sort
          schema:
            type: string
        - description: "Sort direction: asc or desc"
          in: query
          name: direction
          schema:
            type: string
        - description: Maximum number of rows to return (default 100; values below 1 fall back to the default)
          in: query
          name: limit
          schema:
            format: int64
            type: integer
        - description: Time bucket granularity
          in: query
          name: time_granularity
          schema:
            type: string
        - description: Source ID
          in: query
          name: source_id
          schema:
            format: int64
            type: integer
        - description: Only include messages with attachments
          in: query
          name: attachments_only
          schema:
            type: boolean
        - description: Exclude deleted messages
          in: query
          name: hide_deleted
          schema:
            type: boolean
        - description: Search query
          in: query
          name: search_query
          schema:
            type: string
        - description: Lower date/time bound (RFC3339 or YYYY-MM-DD)
          in: query
          name: after
          schema:
            type: string
        - description: Upper date/time bound (RFC3339 or YYYY-MM-DD)
          in: query
          name: before
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Get aggregate rows
      tags:
        - API
  /api/v1/aggregates/sub:
    get:
      operationId: getSubAggregates
      parameters:
        - description: Aggregate view type
          in: query
          name: view_type
          required: true
          schema:
            type: string
        - description: "Sort field: count, size, attachment_size, or name"
          in: query
          name: sort
          schema:
            type: string
        - description: "Sort direction: asc or desc"
          in: query
          name: direction
          schema:
            type: string
        - description: Maximum number of rows to return (default 100; values below 1 fall back to the default)
          in: query
          name: limit
          schema:
            format: int64
            type: integer
        - description: Time bucket granularity
          in: query
          name: time_granularity
          schema:
            type: string
        - description: Source ID
          in: query
          name: source_id
          schema:
            format: int64
            type: integer
        - description: Only include messages with attachments
          in: query
          name: attachments_only
          schema:
            type: boolean
        - description: Exclude deleted messages
          in: query
          name: hide_deleted
          schema:
            type: boolean
        - description: Search query
          in: query
          name: search_query
          schema:
            type: string
        - description: Lower date/time bound (RFC3339 or YYYY-MM-DD)
          in: query
          name: after
          schema:
            type: string
        - description: Upper date/time bound (RFC3339 or YYYY-MM-DD)
          in: query
          name: before
          schema:
            type: string
        - description: Sender email/address filter
          in: query
          name: sender
          schema:
            type: string
        - description: Sender display-name filter
          in: query
          name: sender_name
          schema:
            type: string
        - description: Recipient email/address filter
          in: query
          name: recipient
          schema:
            type: string
        - description: Recipient display-name filter
          in: query
          name: recipient_name
          schema:
            type: string
        - description: Domain filter
          in: query
          name: domain
          schema:
            type: string
        - description: Label filter
          in: query
          name: label
          schema:
            type: string
        - description: Message type filter
          in: query
          name: message_type
          schema:
            type: string
        - description: Named time period
          in: query
          name: time_period
          schema:
            type: string
        - description: Conversation ID
          in: query
          name: conversation_id
          schema:
            format: int64
            type: integer
        - description: Comma-separated aggregate view names to match empty values
          in: query
          name: empty_targets
          schema:
            type: string
        - description: Zero-based row offset
          in: query
          name: offset
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Get nested aggregate rows
      tags:
        - API
  /api/v1/attachments/{id}:
    get:
      operationId: getAttachment
      parameters:
        - description: Attachment ID
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentInfo"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Get attachment metadata
      tags:
        - API
  /api/v1/auth/token/{email}:
    post:
      operationId: uploadToken
      parameters:
        - description: Account email address
          in: path
          name: email
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenUploadRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessageResponse"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Upload an OAuth token
      tags:
        - API
  /api/v1/backup/freeze/begin:
    post:
      operationId: beginBackupFreeze
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupFreezeBeginResponse"
          description: OK
